<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#071019">
<title>潮風天気ビューア</title>
<style>:root{--bg:#071019;--panel:#111a25;--panel2:#172232;--line:#2c3d52;--text:#eef7ff;--sub:#9fb3c8;--accent:#ff8a00;--blue:#45c8ff;--green:#5ee08a;--danger:#ff5d6c;--card:#0d1721}
*{box-sizing:border-box}
html,body{width:100%;min-height:100%;overflow-x:hidden;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{margin:0;background:linear-gradient(180deg,#06101c,#09131e 45%,#04080d);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic UI","Hiragino Sans",Meiryo,sans-serif}
header{position:sticky;top:0;z-index:5;width:100%;background:rgba(7,16,25,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:12px 12px 10px}
.title{display:flex;gap:12px;align-items:center;min-width:0}.title>div:last-child{min-width:0;flex:1}
.logo{width:46px;height:46px;min-width:46px;border-radius:13px;border:1px solid rgba(255,138,0,.55);background:radial-gradient(circle at 30% 25%,#78e5ff,#126090 45%,#071019 70%);position:relative;box-shadow:0 0 22px rgba(255,138,0,.15)}
.logo:before{content:"";position:absolute;left:9px;right:9px;bottom:11px;height:11px;border:2px solid #e9f8ff;border-top:0;border-radius:0 0 50% 50%;transform:rotate(-7deg)}.logo:after{content:"➤";position:absolute;right:6px;top:4px;color:#fff;font-size:18px;transform:rotate(35deg)}
h1{font-size:21px;margin:0;letter-spacing:.03em;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.subtitle{font-size:12px;color:var(--sub);margin-top:3px;line-height:1.35}
.wrap{width:100%;max-width:1100px;margin:0 auto;padding:14px}.panel{width:100%;background:linear-gradient(180deg,var(--panel),#0e1720);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:14px;box-shadow:0 10px 28px rgba(0,0,0,.25)}
.row{display:flex;gap:10px;flex-wrap:wrap}.field{flex:1 1 180px;min-width:0}.field label{display:block;color:var(--sub);font-size:12px;margin:0 0 5px}input,select{width:100%;border:1px solid #3d526c;background:#0a111a;color:var(--text);padding:11px 12px;border-radius:12px;font-size:16px;outline:none;min-width:0}input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,138,0,.18)}
button{border:1px solid var(--accent);background:linear-gradient(180deg,#2b333d,#101820);color:#fff;font-weight:800;border-radius:12px;padding:11px 16px;font-size:15px;box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 0 0 1px rgba(0,0,0,.4);cursor:pointer}.primary{background:linear-gradient(180deg,#ff9b22,#d66d00);color:#111}button:active{transform:translateY(1px)}
.tabs{display:flex;gap:8px;overflow-x:auto;overflow-y:hidden;padding-bottom:4px;-webkit-overflow-scrolling:touch}.tab{white-space:nowrap;border-color:#52657c;background:#101820;color:#cbd8e8}.tab.active{border-color:var(--accent);background:linear-gradient(180deg,#ff9b22,#d66d00);color:#111}.status{font-size:13px;color:var(--sub);margin-top:10px;line-height:1.5}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}.day{min-width:0;background:linear-gradient(180deg,#152233,#0b131d);border:1px solid #2a4058;border-radius:16px;padding:11px}.day.today{border-color:var(--accent)}.date{font-weight:800;white-space:nowrap}.weather{font-size:13px;color:var(--sub);margin:4px 0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.temp{font-size:22px;font-weight:900}.mini{font-size:12px;color:var(--sub);line-height:1.6}.bar{height:8px;background:#1e2a38;border-radius:99px;overflow:hidden;margin-top:6px}.bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--blue),var(--accent));border-radius:99px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
canvas{display:block;width:100%;height:240px;background:#08111a;border:1px solid #26384c;border-radius:15px}.tablewrap{width:100%;overflow:auto;border:1px solid #26384c;border-radius:14px;-webkit-overflow-scrolling:touch}table{width:100%;border-collapse:collapse;font-size:13px;min-width:760px}th,td{padding:8px 9px;border-bottom:1px solid #213247;text-align:left}th{background:#121e2b;position:sticky;top:0}tr:hover{background:#101d2b}.hint{color:var(--sub);font-size:12px;line-height:1.6}.pill{display:inline-flex;align-items:center;gap:5px;border:1px solid #34516d;background:#0a141e;border-radius:99px;padding:4px 8px;color:#cbd8e8;font-size:12px}.alert{color:#ffd18f}.hidden{display:none!important}
@media(max-width:780px){.grid2{grid-template-columns:1fr}.wrap{padding:10px}.panel{border-radius:15px;padding:12px}h1{font-size:19px}.cards{grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.day{padding:10px}.temp{font-size:20px}canvas{height:220px}.field{flex:1 1 calc(50% - 6px)}.field[style]{flex:1 1 100%!important}.field[style] button{width:100%}}
@media(max-width:380px){.cards{grid-template-columns:1fr}canvas{height:210px}.logo{width:42px;height:42px;min-width:42px}.subtitle{font-size:11px}button{font-size:14px;padding:10px 12px}}
</style>
</head>
<body>
<header><div class="title"><div class="logo"></div><div><h1>潮風天気ビューア</h1><div class="subtitle">2週間天気・風向風速・潮位/海況目安をスマホで確認</div></div></div></header>
<div class="wrap">
<section class="panel">
  <div class="row">
    <div class="field"><label>地点</label><select id="preset"></select></div>
    <div class="field"><label>緯度</label><input id="lat" inputmode="decimal"></div>
    <div class="field"><label>経度</label><input id="lon" inputmode="decimal"></div>
    <div class="field" style="flex:0 0 auto;align-self:end"><button class="primary" id="loadBtn">更新</button></div>
  </div>
  <div class="status" id="status">地点を選んで「更新」を押してください。</div>
</section>
<section class="panel"><div class="tabs"><button class="tab active" data-tab="daily">14日カード</button><button class="tab" data-tab="wind">時間別 風</button><button class="tab" data-tab="tide">潮見・海況</button><button class="tab" data-tab="table">一覧/CSV</button></div></section>
<section id="daily" class="panel"><h2>14日予報</h2><div class="cards" id="dailyCards"></div></section>
<section id="wind" class="panel hidden"><h2>時間別 風予報</h2><canvas id="windCanvas" width="900" height="300"></canvas><div class="tablewrap" style="margin-top:12px"><table id="hourlyTable"></table></div></section>
<section id="tide" class="panel hidden"><h2>潮見・海況目安</h2><div class="hint alert">※ 沿岸・港内では誤差があります。作業判断や航行判断には公式潮汐情報も併用してください。</div><canvas id="tideCanvas" width="900" height="300" style="margin-top:10px"></canvas><div id="tideSummary" class="row" style="margin-top:12px"></div></section>
<section id="table" class="panel hidden"><h2>一覧/CSV</h2><button id="csvBtn">CSV出力</button><div class="tablewrap" style="margin-top:12px"><table id="dailyTable"></table></div></section>
<section class="panel"><div class="hint">Googleドライブに置く場合は「ホーム画面に追加」用のブックマークとして使えます。本格的なPWA化はGitHub PagesなどHTTPSで静的配信できる場所がおすすめです。</div></section>
</div>
<script>
const locations=[['東京湾・横浜',35.45,139.64],['名古屋港',35.09,136.88],['大阪港',34.65,135.43],['鹿島港',35.95,140.70],['北九州・門司',33.94,130.96],['博多湾',33.61,130.37],['カスタム',35.45,139.64]];
const W={0:'快晴',1:'晴れ',2:'一部曇り',3:'曇り',45:'霧',48:'霧氷霧',51:'弱い霧雨',53:'霧雨',55:'強い霧雨',61:'弱い雨',63:'雨',65:'強い雨',71:'弱い雪',73:'雪',75:'強い雪',80:'弱いにわか雨',81:'にわか雨',82:'強いにわか雨',95:'雷雨'};
let weather=null,marine=null;
const $=id=>document.getElementById(id);function resizeCanvas(c){const r=c.getBoundingClientRect();const d=window.devicePixelRatio||1;const w=Math.max(320,Math.round(r.width*d));const h=Math.max(180,Math.round(r.height*d));if(c.width!==w||c.height!==h){c.width=w;c.height=h}}function fmt(n,d=1){return n==null||Number.isNaN(n)?'-':Number(n).toFixed(d)}function dirName(deg){if(deg==null)return'-';const a=['北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','西北西','北西','北北西'];return a[Math.round(deg/22.5)%16]}function arrow(deg){return `<span style="display:inline-block;transform:rotate(${deg||0}deg)">↑</span>`}function localDate(s){const d=new Date(s);return `${d.getMonth()+1}/${d.getDate()}(${['日','月','火','水','木','金','土'][d.getDay()]})`}
function setStatus(t){$('status').textContent=t}
function init(){const sel=$('preset');locations.forEach((l,i)=>{let o=document.createElement('option');o.value=i;o.textContent=l[0];sel.appendChild(o)});sel.onchange=()=>{let l=locations[sel.value];$('lat').value=l[1];$('lon').value=l[2]};sel.onchange();$('loadBtn').onclick=load;$('csvBtn').onclick=csv;document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));load()}
function switchTab(id){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));['daily','wind','tide','table'].forEach(x=>$(x).classList.toggle('hidden',x!==id));if(id==='wind')drawWind();if(id==='tide')drawTide()}
async function load(){try{setStatus('取得中...');const lat=parseFloat($('lat').value),lon=parseFloat($('lon').value);localStorage.setItem('twv_loc',JSON.stringify([lat,lon,$('preset').value]));const daily='weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,wind_speed_10m_max,wind_gusts_10m_max,wind_direction_10m_dominant';const hourly='temperature_2m,precipitation_probability,wind_speed_10m,wind_direction_10m,wind_gusts_10m';const u1=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=${daily}&hourly=${hourly}&forecast_days=14&timezone=auto&wind_speed_unit=ms`;const u2=`https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=sea_level_height_msl,wave_height,wave_direction,swell_wave_height&forecast_days=8&timezone=auto`;let [r1,r2]=await Promise.all([fetch(u1),fetch(u2)]);if(!r1.ok)throw new Error('天気API取得エラー');weather=await r1.json();marine=r2.ok?await r2.json():null;renderAll();setStatus('更新しました: '+new Date().toLocaleString('ja-JP'))}catch(e){setStatus('エラー: '+e.message)}}
function renderAll(){renderDaily();renderHourly();renderDailyTable();drawWind();renderTideSummary();drawTide()}
function renderDaily(){const d=weather.daily,box=$('dailyCards');box.innerHTML='';d.time.forEach((t,i)=>{let max=d.temperature_2m_max[i],min=d.temperature_2m_min[i],wind=d.wind_speed_10m_max[i],dir=d.wind_direction_10m_dominant[i];let el=document.createElement('div');el.className='day'+(i===0?' today':'');el.innerHTML=`<div class="date">${localDate(t)}</div><div class="weather">${W[d.weather_code[i]]||'天気コード '+d.weather_code[i]}</div><div class="temp">${fmt(max,0)}°/${fmt(min,0)}°</div><div class="mini">降水 ${d.precipitation_probability_max[i]??'-'}%<br>風 ${dirName(dir)} ${fmt(wind,1)}m/s ${arrow(dir)}</div><div class="bar"><span style="width:${Math.min(100,(wind||0)*8)}%"></span></div>`;box.appendChild(el)})}
function renderHourly(){const h=weather.hourly;let html='<tr><th>日時</th><th>風向</th><th>風速</th><th>突風</th><th>降水%</th><th>気温</th></tr>';for(let i=0;i<Math.min(h.time.length,72);i++){html+=`<tr><td>${h.time[i].replace('T',' ')}</td><td>${dirName(h.wind_direction_10m[i])} ${arrow(h.wind_direction_10m[i])}</td><td>${fmt(h.wind_speed_10m[i])}m/s</td><td>${fmt(h.wind_gusts_10m[i])}m/s</td><td>${h.precipitation_probability[i]??'-'}%</td><td>${fmt(h.temperature_2m[i])}°C</td></tr>`}$('hourlyTable').innerHTML=html}
function renderDailyTable(){const d=weather.daily;let html='<tr><th>日付</th><th>天気</th><th>最高</th><th>最低</th><th>降水%</th><th>風向</th><th>最大風速</th><th>突風</th></tr>';d.time.forEach((t,i)=>html+=`<tr><td>${localDate(t)}</td><td>${W[d.weather_code[i]]||d.weather_code[i]}</td><td>${fmt(d.temperature_2m_max[i])}</td><td>${fmt(d.temperature_2m_min[i])}</td><td>${d.precipitation_probability_max[i]??'-'}</td><td>${dirName(d.wind_direction_10m_dominant[i])}</td><td>${fmt(d.wind_speed_10m_max[i])}</td><td>${fmt(d.wind_gusts_10m_max[i])}</td></tr>`);$('dailyTable').innerHTML=html}
function renderTideSummary(){const box=$('tideSummary');box.innerHTML='';if(!marine||!marine.hourly){box.innerHTML='<span class="pill">海況データなし</span>';return}let h=marine.hourly, vals=h.sea_level_height_msl||[];let peaks=[];for(let i=1;i<vals.length-1;i++){if(vals[i]!=null&&vals[i]>vals[i-1]&&vals[i]>vals[i+1])peaks.push(['満潮候補',h.time[i],vals[i]]);if(vals[i]!=null&&vals[i]<vals[i-1]&&vals[i]<vals[i+1])peaks.push(['干潮候補',h.time[i],vals[i]])}peaks.slice(0,10).forEach(p=>{let s=document.createElement('span');s.className='pill';s.textContent=`${p[0]} ${p[1].replace('T',' ')} ${fmt(p[2],2)}m`;box.appendChild(s)})}
function drawChart(canvas,series,labels,opts={}){const c=$(canvas);resizeCanvas(c);const ctx=c.getContext('2d'),w=c.width,h=c.height;ctx.clearRect(0,0,w,h);ctx.fillStyle='#08111a';ctx.fillRect(0,0,w,h);const pad=42,top=20,b=h-34,plotW=w-pad-14,plotH=b-top;let all=series.flatMap(s=>s.data).filter(v=>v!=null);if(!all.length){ctx.fillStyle='#9fb3c8';ctx.fillText('データなし',pad,50);return}let min=Math.min(...all),max=Math.max(...all);if(min>0)min=0;if(max===min){max+=1;min-=1}ctx.strokeStyle='#23374c';ctx.lineWidth=1;ctx.fillStyle='#9fb3c8';ctx.font='13px sans-serif';for(let g=0;g<=4;g++){let y=top+plotH*g/4;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-14,y);ctx.stroke();let v=max-(max-min)*g/4;ctx.fillText(fmt(v,opts.dec??1),5,y+4)}series.forEach((s,si)=>{ctx.strokeStyle=s.color;ctx.lineWidth=3;ctx.beginPath();s.data.forEach((v,i)=>{if(v==null)return;let x=pad+plotW*(i/(s.data.length-1||1));let y=top+plotH*(1-(v-min)/(max-min));if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});ctx.stroke();ctx.fillStyle=s.color;ctx.fillText(s.name,pad+si*120,15)});ctx.fillStyle='#9fb3c8';for(let i=0;i<labels.length;i+=Math.ceil(labels.length/6)){let x=pad+plotW*(i/(labels.length-1||1));ctx.fillText(labels[i],x-18,h-10)}}
function drawWind(){if(!weather)return;const h=weather.hourly;drawChart('windCanvas',[{name:'風速 m/s',color:'#45c8ff',data:h.wind_speed_10m.slice(0,72)},{name:'突風 m/s',color:'#ff8a00',data:h.wind_gusts_10m.slice(0,72)}],h.time.slice(0,72).map(t=>t.slice(11,16)))}
function drawTide(){if(!marine||!marine.hourly)return;const h=marine.hourly;drawChart('tideCanvas',[{name:'潮位目安 m',color:'#5ee08a',data:(h.sea_level_height_msl||[]).slice(0,192)},{name:'波高 m',color:'#45c8ff',data:(h.wave_height||[]).slice(0,192)}],h.time.slice(0,192).map(t=>t.slice(5,10)),{dec:2})}
function csv(){if(!weather)return;const d=weather.daily;let rows=[['日付','天気','最高','最低','降水確率','風向','最大風速m/s','突風m/s']];d.time.forEach((t,i)=>rows.push([t,W[d.weather_code[i]]||d.weather_code[i],d.temperature_2m_max[i],d.temperature_2m_min[i],d.precipitation_probability_max[i],dirName(d.wind_direction_10m_dominant[i]),d.wind_speed_10m_max[i],d.wind_gusts_10m_max[i]]));let blob=new Blob(['\ufeff'+rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='tide_wind_weather.csv';a.click();URL.revokeObjectURL(a.href)}
init();
window.addEventListener('resize',()=>{if(weather){drawWind();drawTide();}});
</script>
</body>
</html>
